<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서버 인증</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0d0f13;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: #5865f2; top: -150px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: #7289da; bottom: -100px; right: -80px; animation-delay: 3s; }
    .orb-3 { width: 300px; height: 300px; background: #4752c4; top: 40%; left: 60%; animation-delay: 1.5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(88, 101, 242, 0.6);
      border-radius: 50%;
      animation: rise linear infinite;
    }

    @keyframes rise {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20px;
    }

    .logo {
      font-size: 48px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .card {
      background: rgba(30, 33, 47, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(88, 101, 242, 0.3);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 100px rgba(88, 101, 242, 0.1);
      animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .shield-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #5865f2, #7289da);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(88, 101, 242, 0.4);
      animation: glow 3s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 8px 32px rgba(88, 101, 242, 0.4); }
      50% { box-shadow: 0 8px 48px rgba(88, 101, 242, 0.7); }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 14px;
      color: #8a8f98;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .info-box {
      background: rgba(88, 101, 242, 0.1);
      border: 1px solid rgba(88, 101, 242, 0.25);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 28px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #b9bbbe;
      padding: 6px 0;
    }

    .info-item:not(:last-child) {
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .info-icon { font-size: 16px; flex-shrink: 0; }

    .auth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, #5865f2, #4752c4);
      color: white;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(88, 101, 242, 0.4);
      position: relative;
      overflow: hidden;
    }

    .auth-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(88, 101, 242, 0.6);
    }

    .auth-btn:hover::before { opacity: 1; }
    .auth-btn:active { transform: translateY(0); }

    .discord-logo {
      width: 24px;
      height: 24px;
      fill: white;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .divider span { font-size: 12px; color: #4f545c; }

    .notice {
      font-size: 12px;
      color: #4f545c;
      line-height: 1.7;
    }

    .notice a { color: #5865f2; text-decoration: none; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(87, 242, 135, 0.1);
      border: 1px solid rgba(87, 242, 135, 0.3);
      color: #57f287;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      background: #57f287;
      border-radius: 50%;
      animation: blink 1.5s ease infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    footer {
      color: #4f545c;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="card">
      <div class="shield-icon">🛡️</div>
      <div class="badge">
        <div class="badge-dot"></div>
        인증 시스템 온라인
      </div>
      <h1>서버 인증</h1>
      <p class="subtitle">이 서버에 접근하려면 Discord 계정으로<br>인증을 완료해야 합니다.</p>

      <div class="info-box">
        <div class="info-item">
          <span class="info-icon">✅</span>
          <span>인증 완료 시 역할이 자동으로 부여됩니다</span>
        </div>
        <div class="info-item">
          <span class="info-icon">🔒</span>
          <span>인증 정보는 안전하게 암호화되어 저장됩니다</span>
        </div>
        <div class="info-item">
          <span class="info-icon">⚡</span>
          <span>인증은 1분 이내에 완료됩니다</span>
        </div>
      </div>

      <a id="authBtn" class="auth-btn" href="#" onclick="startAuth()">
        <svg class="discord-logo" viewBox="0 0 71 55" xmlns="http://www.w3.org/2000/svg">
          <path d="M60.1 4.9C55.5 2.8 50.7 1.2 45.7.6c-.7 1.2-1.3 2.4-1.8 3.7-5.3-.8-10.7-.8-16 0C27.4 3 26.7 1.8 26 .6c-5 .6-9.8 2.2-14.4 4.3C1.7 18.9-.9 32.9.3 46.7c5.5 4.1 10.7 6.6 16 8.2 1.3-1.7 2.4-3.6 3.3-5.5-1.8-.7-3.5-1.5-5.1-2.5.4-.3.9-.6 1.3-.9 9.8 4.6 20.5 4.6 30.2 0 .4.3.9.6 1.3.9-1.6 1-3.3 1.8-5.1 2.5.9 1.9 2 3.8 3.3 5.5 5.3-1.6 10.5-4.1 16-8.2 1.4-15.6-2.3-29.5-11.4-41.8zM23.7 38.5c-3.4 0-6.2-3.1-6.2-7s2.7-7.1 6.2-7.1 6.3 3.2 6.2 7.1c0 3.9-2.8 7-6.2 7zm23.6 0c-3.4 0-6.2-3.1-6.2-7s2.7-7.1 6.2-7.1 6.3 3.2 6.2 7.1c0 3.9-2.7 7-6.2 7z"/>
        </svg>
        Discord로 인증하기
      </a>

      <div class="divider"><span>안내</span></div>
      <p class="notice">
        인증 버튼을 클릭하면 Discord OAuth 인증 페이지로 이동합니다.<br>
        이 서비스는 귀하의 Discord 계정 정보에만 접근합니다.
      </p>
    </div>
    <footer>Discord Recovery Bot · 보안 인증 시스템</footer>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const guild = params.get('guild');
    if (guild) {
      document.getElementById('authBtn').href = `/api/auth/discord?guild=${guild}`;
    }

    function startAuth() {
      if (!guild) {
        alert('서버 ID가 없습니다. 디스코드 서버에서 /인증창 명령어를 사용하세요.');
        return false;
      }
    }

    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
      p.style.opacity = (0.3 + Math.random() * 0.5).toString();
      particlesContainer.appendChild(p);
    }
  </script>
</body>
</html>
