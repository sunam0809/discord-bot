<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인증 오류</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0d0f13;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bg-orbs { position: fixed; inset: 0; pointer-events: none; }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.2; }
    .orb-1 { width: 400px; height: 400px; background: #ed4245; top: -100px; left: -100px; }
    .orb-2 { width: 300px; height: 300px; background: #5865f2; bottom: -80px; right: -60px; }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(30, 33, 47, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(237, 66, 69, 0.3);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 400px;
      width: calc(100% - 40px);
      text-align: center;
      animation: slideUp 0.5s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .error-icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #ed4245, #c0392b);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(237, 66, 69, 0.4);
    }

    h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 12px; }
    .msg { font-size: 14px; color: #8a8f98; margin-bottom: 28px; line-height: 1.6; }
    .error-text { color: #ed4245; font-weight: 500; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: rgba(88, 101, 242, 0.2);
      border: 1px solid rgba(88, 101, 242, 0.4);
      color: #7289da;
      font-size: 14px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn:hover { background: rgba(88, 101, 242, 0.35); }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>
  <div class="card">
    <div class="error-icon">❌</div>
    <h1>인증 실패</h1>
    <p class="msg">
      인증 중 오류가 발생했습니다.<br>
      <span class="error-text" id="errMsg"></span>
    </p>
    <a class="btn" href="javascript:history.back()">← 다시 시도</a>
  </div>
  <script>
    const msg = new URLSearchParams(location.search).get('msg');
    document.getElementById('errMsg').textContent = msg || '';
  </script>
</body>
</html>
