services:
  - type: web
    name: discord-recovery-bot
    env: node
    buildCommand: npm install
    startCommand: node index.js
    plan: free
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: SITE_URL
        sync: false
      - key: PORT
        value: "3000"
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
